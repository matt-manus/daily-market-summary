name: Daily Market Summary

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
on:
  # Scheduled: UTC 22:00 Mon–Fri  (= US market close + 2 hours)
  # HKT equivalent: 06:00 Tue–Sat (next morning)
  schedule:
    - cron: "0 22 * * 1-5"

  # Manual trigger: allows on-demand run from GitHub Actions UI
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# PERMISSIONS
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  generate-report:
    name: Generate & Publish Market Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ───────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install Python dependencies ──────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            requests \
            yfinance \
            pytz \
            beautifulsoup4 \
            lxml \
            openai \
            playwright \
            Pillow

      # ── 5. Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ── 6. Fetch all market data ─────────────────────────────────────────────
      - name: Step 1 — Fetch market data
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 1: Fetching market data"
          echo "════════════════════════════════════════"
          python scripts/fetch_all_data.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 7. Capture chart screenshots ─────────────────────────────────────────
      - name: Step 2A — Capture StockCharts trend screenshots
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 2A: StockCharts trend screenshots"
          echo "════════════════════════════════════════"
          python scripts/screenshot_trends.py || echo "⚠ screenshot_trends.py failed — continuing"
        env:
          PYTHONUNBUFFERED: "1"

      - name: Step 2B — Capture Finviz heatmap & industry screenshots
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 2B: Finviz screenshots"
          echo "════════════════════════════════════════"
          python scripts/screenshot_finviz.py || echo "⚠ screenshot_finviz.py failed — continuing"
        env:
          PYTHONUNBUFFERED: "1"

      - name: Step 2C — Capture Stockbee Market Monitor screenshot
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 2C: Stockbee screenshot"
          echo "════════════════════════════════════════"
          python scripts/screenshot_stockbee.py || echo "⚠ screenshot_stockbee.py failed — continuing"
        env:
          PYTHONUNBUFFERED: "1"

      # ── 8. Generate AI strategy (requires OPENAI_API_KEY) ────────────────────
      - name: Step 3 — Generate AI strategy
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 3: AI strategy generation"
          echo "════════════════════════════════════════"
          python scripts/generate_ai_strategy.py || echo "⚠ generate_ai_strategy.py failed — continuing"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONUNBUFFERED: "1"

      # ── 9. Render the HTML report ─────────────────────────────────────────────
      - name: Step 4 — Render HTML report
        run: |
          echo "════════════════════════════════════════"
          echo "  STEP 4: Rendering report"
          echo "════════════════════════════════════════"
          python scripts/render_report.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 10. Verify output files ───────────────────────────────────────────────
      - name: Verify output files
        run: |
          echo "── Output verification ──"
          ls -lh index.html || echo "⚠ index.html missing!"
          ls -lh archive/ | tail -5 || echo "⚠ archive/ empty"
          echo "index.html size: $(wc -c < index.html) bytes"
          ARCHIVE_COUNT=$(ls archive/*.html 2>/dev/null | wc -l)
          echo "Archive files: ${ARCHIVE_COUNT}"

      # ── 11. Auto-commit and push updated files ────────────────────────────────
      - name: Auto-commit & push report to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: Daily Market Summary $(date -u +'%Y-%m-%d %H:%M UTC')"
          file_pattern: |
            index.html
            archive/*.html
            data/today_market.json
            data/ai_strategy.json
            assets/img/today/*.png
          commit_user_name: "Market-OS Bot"
          commit_user_email: "market-os-bot@users.noreply.github.com"
          commit_author: "Market-OS Bot <market-os-bot@users.noreply.github.com>"

name: Daily Market Report

on:
  schedule:
    - cron: '05 23 * * 1-5'     # UTC 23:05 = HKT 早上 07:05（星期二至六）
  workflow_dispatch:            # 允許手動觸發測試
  push:                         # ← 臨時加入，幫助 GitHub 立刻認這個 workflow
    branches: [ dev ]

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Market Summary Renderer
        run: python scripts/render_report.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive/
          git diff --cached --quiet || git commit -m "📊 Auto update daily market report (Phase 3.95)"
          git push

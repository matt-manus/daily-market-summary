name: Dev-3.9 Trial Run (Daily Automatic Pipeline)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 23 * * *'     # 每日香港時間早上 7:00 (UTC 23:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trial-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Full Pipeline
        run: python scripts/full_pipeline.py

      - name: Commit and Push changes (if any)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/img/today/ archive/ data/
          git diff --quiet && git diff --staged --quiet || \
          (git commit -m "Auto-update market data & screenshots [skip ci]" && \
           git pull --rebase origin main && \
           git push origin main)
